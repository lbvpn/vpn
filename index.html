<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载中心</title>
    <meta name="apple-mobile-web-app-title" content="永久链接">
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="./image/touch-icon-iphone.png">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
       
        
        <section class="content">
            <h2>请选择您的设备下载</h2>
            <div class="download-buttons">
                <div class="download-item">
                    <a href="#" class="button" id="android-download">Android v3.2.0.apk</a>
                </div>
                <a href="#" class="button" id="ios-web-download">iOS 网页版</a>
                <div class="download-item">
                    <a href="#" class="button" id="windows-download">Windows V4.3.0.exe</a>
                </div>
                <div class="download-item">
                    <a href="#" class="button" id="macos-download">macOS v3.5.0.pkg</a>
                </div>
            </div>

            
        </section>
        
       
    </div>
    <script>
        (function () {
            var platformTargets = {
                android: {
                    url: "https://github.com/lbvpn/vpn/releases/download/liebao-latest-apk/liebao-v3.2.0-32.apk",
                    version: "v3.2.0",
                    extension: "apk",
                    label: "Android"
                },
                windows: {
                    url: "https://github.com/lbvpn/vpn/releases/download/liebao-latest-exe/liebao-V4.3.0-20.exe",
                    version: "V4.3.0",
                    extension: "exe",
                    label: "Windows"
                },
                macos: {
                    url: "https://github.com/lbvpn/vpn/releases/download/liebao-latest-pkg/liebao-v3.5.0-71.pkg",
                    version: "v3.5.0",
                    extension: "pkg",
                    label: "macOS"
                },
                "ios-web": {
                    url: "web/index.html?channel=GitHub",
                    label: "iOS 网页版"
                }
            };

            function applyDownloadTarget(elementId, targetKey) {
                var element = document.getElementById(elementId);
                var target = platformTargets[targetKey];

                if (!element || !target) {
                    return;
                }

                element.href = target.url;
                element.textContent = target.version
                    ? target.label + " " + target.version + "." + target.extension
                    : target.label;
            }

            applyDownloadTarget("android-download", "android");
            applyDownloadTarget("ios-web-download", "ios-web");
            applyDownloadTarget("windows-download", "windows");
            applyDownloadTarget("macos-download", "macos");
        })();
    </script>
</body>
</html>
